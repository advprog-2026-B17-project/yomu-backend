name: Deploy Backend to EC2

on:
  push:
    branches: [ "main" ] # Atau "master", sesuaikan nama branch utamamu

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/yomu-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. Stop container lama (kalau ada)
            docker stop yomu-backend || true
            docker rm yomu-backend || true
            
            # 2. Hapus image lama biar hemat tempat
            docker rmi ${{ secrets.DOCKER_USERNAME }}/yomu-backend:latest || true
            
            # 3. Download image baru
            docker pull ${{ secrets.DOCKER_USERNAME }}/yomu-backend:latest
            
            # 4. Jalankan aplikasi baru
            docker run -d \
              --name yomu-backend \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL="jdbc:postgresql://${{ secrets.RDS_ENDPOINT }}:5432/yomu_db" \
              -e SPRING_DATASOURCE_USERNAME=postgres \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASSWORD }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              ${{ secrets.DOCKER_USERNAME }}/yomu-backend:latest